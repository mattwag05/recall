name: Strix Security Scan

# Agentic AI pentest via Strix, driven by a local LLM (zero cost).
# Runs on the docker-host host-executor (Strix spawns its own sandbox container).
# Uses the pre-built ~/strix-venv on the runner host (openai pinned to 2.26.0 for the
# openai-agents 0.14.6 usage-schema compatibility). Exit 2 = vulns found = job fails.

on:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [quick, deep]
        default: quick
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 8 * * 1"   # Mon 08:30 UTC = 04:30 ET (staggered: 2nd of 3, after agentic-crm)

jobs:
  strix:
    runs-on: docker-host
    # was unbounded -> a hung scan burned the runner's 3h ceiling (Tutor
    # 2026-07-20). Kills a hang ~2h sooner; on timeout the run is 'cancelled'
    # and skips the alert steps below, so the pironman red-main watcher is the
    # backstop alert for that case. 2026-07-23.
    timeout-minutes: 90
    steps:
      - name: Guard — require LLM key
        run: |
          if [ -z "${{ secrets.STRIX_LLM_KEY }}" ]; then
            echo "STRIX_LLM_KEY not set — refusing to run."; exit 1
          fi

      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset LLM engine (fresh memory headroom)
        run: |
          MODEL="${{ vars.STRIX_LLM }}"; MODEL="${MODEL#openai/}"
          curl -s --max-time 30 -X POST \
            -H "Authorization: Bearer ${{ secrets.STRIX_LLM_KEY }}" \
            "${{ vars.LLM_API_BASE }}/models/$MODEL/unload" >/dev/null || true

      - name: Scan
        id: scan
        run: |
          MODE="${{ github.event.inputs.mode || 'quick' }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SCOPE="--scope-mode diff --diff-base origin/${{ github.base_ref }}"
          else
            SCOPE=""
          fi
          echo "Strix $MODE scan (scope: ${SCOPE:-full}) on ${{ github.repository }}"
          set +e
          "$HOME/strix-venv/bin/strix" -n -t "$PWD" --scan-mode "$MODE" $SCOPE 2>&1 | tee strix-output.txt
          rc=${PIPESTATUS[0]}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Strix exits 2 on ANY finding, and the local model has a real
          # false-positive rate on nuanced diffs -- a bogus LOW would keep the
          # branch red indefinitely and the red-main watcher would re-flag it
          # forever. Fail only on HIGH/CRITICAL; LOW/MEDIUM are advisory.
          # 2026-07-23, ROADMAP item 11.
          if [ "$rc" != "2" ]; then exit "$rc"; fi
          # "Vulnerabilities" also appears in the report prose -- the summary
          # panel is the LAST line carrying a severity token.
          LINE=$(sed 's/\x1b\[[0-9;]*m//g' strix-output.txt | grep -E 'Vulnerabilities +[A-Z]+:' | tail -1)
          SEV=$(echo "$LINE" | grep -oE '(CRITICAL|HIGH|MEDIUM|LOW): *[0-9]+' | tr '\n' ' ')
          echo "severity=$SEV" >> "$GITHUB_OUTPUT"
          echo "Strix severity summary: ${SEV:-<unparsed>}"
          if [ -z "$SEV" ]; then
            echo "::error::Could not parse the Strix severity summary -- failing closed."; exit 2
          fi
          case "$SEV" in
            *CRITICAL:*|*HIGH:*) exit 2 ;;
          esac
          echo "::warning::Strix findings are LOW/MEDIUM only ($SEV) -- advisory, not failing the job."
          exit 0
        env:
          STRIX_LLM: ${{ vars.STRIX_LLM }}
          LLM_API_BASE: ${{ vars.LLM_API_BASE }}
          LLM_API_KEY: ${{ secrets.STRIX_LLM_KEY }}

      - name: Free LLM engine after scan
        if: always()
        run: |
          MODEL="${{ vars.STRIX_LLM }}"; MODEL="${MODEL#openai/}"
          curl -s --max-time 30 -X POST \
            -H "Authorization: Bearer ${{ secrets.STRIX_LLM_KEY }}" \
            "${{ vars.LLM_API_BASE }}/models/$MODEL/unload" >/dev/null || true

      - name: Alert on findings
        if: failure() && steps.scan.outputs.rc == '2'
        run: |
          curl -s --max-time 15 \
            -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: Strix findings - ${{ github.repository }}" \
            -d "Strix flagged security issues on ${{ github.ref_name }} (run ${{ github.run_number }}). Check the job log / strix_runs artifacts." \
            ${{ vars.NTFY_URL }}

      - name: Alert on scan crash
        if: failure() && steps.scan.outputs.rc != '2'
        run: |
          curl -s --max-time 15 \
            -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: Strix crashed - ${{ github.repository }}" \
            -d "Strix scan CRASHED on ${{ github.ref_name }} (run ${{ github.run_number }}, rc=${{ steps.scan.outputs.rc }}) — infra/LLM-server error, NOT findings. Check the job log." \
            ${{ vars.NTFY_URL }}

      - name: Advisory PR comment on LOW/MEDIUM findings
        if: success() && steps.scan.outputs.rc == '2' && github.event_name == 'pull_request'
        run: |
          printf '%s' '{"body": "\u26a0\ufe0f **Strix advisory** \u2014 findings below the HIGH threshold, so this scan is not blocking the PR.\n\nSeverity: `${{ steps.scan.outputs.severity }}`\n\nFull report is in the job log for run ${{ github.run_number }}. Triage before merge; the local model has a known false-positive rate at LOW/MEDIUM."}' > strix-comment.json
          curl -s --max-time 20 -X POST \
            -H "Authorization: token ${{ secrets.FJ_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @strix-comment.json \
            "${{ vars.FJ_API_BASE }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" >/dev/null
