name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Set up Node
        uses: https://data.forgejo.org/actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm
        uses: https://data.forgejo.org/actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint
        run: npm run lint --if-present || echo "::warning::lint issues (non-blocking baseline)"

      - name: Type-check
        run: |
          if [ -f tsconfig.json ]; then npx --no-install tsc --noEmit || echo "::warning::tsc found pre-existing type errors (non-blocking baseline)"; fi

      - name: Test
        run: npm test --if-present
        env:
          CI: "true"

      - name: Build
        run: npm run build --if-present || echo "::warning::build failed on pre-existing type debt (non-blocking baseline)"
        env:
          CI: "true"

      - name: Notify failure
        if: failure()
        run: |
          curl -s --max-time 15 -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: CI failure - ${{ github.repository }}" \
            -d "TypeScript CI failed on ${{ github.ref_name }} (run ${{ github.run_number }})." \
            ${{ vars.NTFY_URL }}
