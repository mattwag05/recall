name: gitleaks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          V=8.30.1
          ARCH=$(uname -m); case "$ARCH" in aarch64|arm64) A=arm64;; *) A=x64;; esac
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_${A}.tar.gz" | tar xz gitleaks
          sudo mv gitleaks /usr/local/bin/ 2>/dev/null || mv gitleaks "$HOME/gitleaks"

      - name: Scan full history for secrets
        run: |
          GL=/usr/local/bin/gitleaks; [ -x "$GL" ] || GL="$HOME/gitleaks"
          "$GL" git --no-banner --redact -v .

      - name: Notify failure
        if: failure()
        run: |
          curl -s --max-time 15 -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: gitleaks failure - ${{ github.repository }}" \
            -d "Secret scan failed on ${{ github.ref_name }} (run ${{ github.run_number }})." \
            ${{ vars.NTFY_URL }}
